<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #ffffff; color: #fff; }

  /* ============================================================
     HERO — dark card on a white page that expands to full width
     as you scroll.
       - .hero is tall (scroll distance)
       - .hero-stage is pinned (sticky), white frame
       - .hero-card is the dark rounded box; JS grows it to full-bleed
       - inside: headline (rises+fades) + laptop (grows+rises)
     ============================================================ */
  .hero { position: relative; height: 140vh; background: #ffffff; }
  .hero-stage {
    position: sticky; top: 0; height: 100vh;
    display: flex; align-items: flex-end; justify-content: center;
    background: #ffffff;
  }
  .hero-card {
    position: relative; overflow: hidden;
    width: 76%; height: 90%; border-radius: 30px 30px 0 0;
    background: #05060a;
    box-shadow: 0 50px 120px rgba(20, 16, 60, 0.28);
    display: flex; align-items: center; justify-content: center;
    will-change: width, height, border-radius;
  }

  /* Mock header: transparent bar, black text, a frosted pill per item.
     Sits in the stage (not the card) so it stays at the top; JS fades it. */
  .hero-header {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    width: 76%; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    will-change: opacity, transform, filter;
  }
  .hh-nav { display: flex; align-items: center; gap: 8px; }
  .hh-item {
    color: #07080d; font-size: 0.9rem; font-weight: 500;
    padding: 9px 15px; border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.55);
  }
  .hh-logo { font-weight: 800; letter-spacing: 0.02em; }
  .hh-cta { background: rgba(109, 92, 255, 0.92); color: #fff; border-color: transparent; }

  /* Glow inside the card (swap for a Spline iframe later) */
  .hero-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(70vw 60vh at 50% 66%, rgba(109,92,255,0.20), transparent 72%),
      radial-gradient(40vw 40vh at 50% 28%, rgba(150,90,255,0.09), transparent 74%),
      #030409;
  }

  /* Centered headline overlay inside the card */
  .hero-content {
    position: absolute; left: 0; right: 0; top: 13%;
    z-index: 3; margin: 0 auto; max-width: 760px; padding: 0 24px;
    text-align: center; will-change: transform, opacity, filter;
  }
  .eyebrow { font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: #b6b3e4; margin-bottom: 1rem; }
  h1 { font-size: clamp(2.2rem, 5.4vw, 4rem); line-height: 1.04; letter-spacing: -0.035em; margin: 0 auto 1.1rem; }
  .lead { color: #c8c6e0; max-width: 46ch; margin: 0 auto 1.6rem; font-size: 1.05rem; }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn { border: 0; border-radius: 999px; padding: 12px 22px; font-size: 0.95rem; cursor: pointer; }
  .btn--primary { background: #6d5cff; color: #fff; }
  .btn--ghost { background: rgba(255,255,255,0.10); color: #fff; }

  /* PLACEHOLDER — a "half rectangle" device hugging the bottom-center of the
     card. Static: it does NOT animate on scroll (the card expands around it).
     Bottom corners bleed past the card's bottom edge (clipped by overflow). */
  .hero-placeholder {
    position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
    width: 50%; z-index: 2; line-height: 0;
  }
  .hero-placeholder img {
    display: block; width: 100%; height: auto;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -24px 90px rgba(0, 0, 0, 0.55);
  }

  .after { min-height: 100vh; background: #f3f4f8; color: #2a2c3a; display: grid; place-items: center; }
  .after h2 { font-size: clamp(1.8rem, 4vw, 3rem); }
</style>
</head>
<body>
  <header class="hero-header">
    <span class="hh-item hh-logo">LIMITLESS</span>
    <nav class="hh-nav">
      <span class="hh-item">Features</span>
      <span class="hh-item">Solutions</span>
      <span class="hh-item">Pricing</span>
      <span class="hh-item hh-cta">Book a demo</span>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-stage">
      <div class="hero-card">
        <div class="hero-bg"></div>

        <div class="hero-content">
          <p class="eyebrow">Software company</p>
          <h1>One platform. Without limits.</h1>
          <p class="lead">Real-time financials, job costing, and project management — finally in one place.</p>
          <div class="actions">
            <button class="btn btn--primary">Explore Limitless</button>
            <button class="btn btn--ghost">Talk to us</button>
          </div>
        </div>

        <!-- Mockup image hugging the bottom (static). -->
        <div class="hero-placeholder" aria-hidden="true"><img src="https://spicolatechnologies.com/wp-content/uploads/2026/06/hero-mockup-scaled.png" alt=""></div>
      </div>
    </div>
  </section>

  <section class="after"><h2>Next section starts here</h2></section>

  <script>
    (function () {
      var hero = document.querySelector('.hero');
      var card = document.querySelector('.hero-card');
      var header = document.querySelector('.hero-header');
      var content = document.querySelector('.hero-content');

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
      // sub-progress 0->1 as p moves across [a, b]
      function range(p, a, b) { return clamp((p - a) / (b - a), 0, 1); }

      function readProgress() {
        var total = hero.offsetHeight - window.innerHeight;
        if (total <= 0) total = 1;
        return clamp(-hero.getBoundingClientRect().top / total, 0, 1);
      }

      function apply(p) {
        // Card finishes expanding at 78%, leaving a little scroll before header.
        var ce = easeInOut(clamp(p / 0.78, 0, 1));
        card.style.width = (76 + ce * 24) + '%';        // 76% -> 100%
        card.style.height = (90 + ce * 10) + '%';        // 90% -> 100%
        var r = (30 * (1 - ce));                         // top corners 30 -> 0
        card.style.borderRadius = r + 'px ' + r + 'px 0 0';
        card.style.boxShadow = '0 50px 120px rgba(20,16,60,' + (0.28 * (1 - ce)) + ')';

        // Headline + buttons: the more you scroll, the more they blur + fade +
        // rise away (and reverse as you scroll back). Scrubbed across [0.02, 0.45].
        var co = range(p, 0.02, 0.45);
        content.style.opacity = String(1 - co);
        content.style.filter = 'blur(' + (co * 12) + 'px)';
        content.style.transform = 'translateY(' + (-co * 80) + 'px) scale(' + (1 - co * 0.03) + ')';

        // Header: scrubs out across [0.03, 0.30], then scrubs back in across
        // [0.88, 1] once the card is full-width.
        var hv = clamp(1 - range(p, 0.03, 0.30) + range(p, 0.88, 1), 0, 1);
        header.style.opacity = String(hv);
        header.style.filter = 'blur(' + ((1 - hv) * 8) + 'px)';
        header.style.transform = 'translateX(-50%) translateY(' + (-(1 - hv) * 22) + 'px)';
        header.style.pointerEvents = hv < 0.5 ? 'none' : 'auto';
        // (Placeholder is intentionally static — no scroll animation.)
      }

      // Smoothing: lerp the applied progress toward the scroll target each
      // frame so the expansion glides instead of tracking the wheel 1:1.
      var target = readProgress(), current = target, rafId = null;
      function tick() {
        current += (target - current) * 0.12;
        if (Math.abs(target - current) < 0.0005) {
          current = target; apply(current); rafId = null; return;
        }
        apply(current);
        rafId = requestAnimationFrame(tick);
      }
      function onScroll() {
        target = readProgress();
        if (rafId === null) { rafId = requestAnimationFrame(tick); }
      }

      apply(current);
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
    })();
  </script>
</body>
</html>
