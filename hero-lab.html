<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #ffffff; color: #14141A; }

  /* ============================================================
     HERO — dark card on a white page that expands to full width
     as you scroll.
       - .hero is tall (scroll distance)
       - .hero-stage is pinned (sticky), white frame
       - .hero-card is the dark rounded box; JS grows it to full-bleed
       - inside: headline (rises+fades) + laptop (grows+rises)
     ============================================================ */
  .hero { position: relative; height: 140vh; background: #ffffff; }
  .hero-stage {
    position: sticky; top: 0; height: 100vh;
    display: flex; align-items: flex-end; justify-content: center;
    background: #ffffff;
  }
  .hero-card {
    position: relative; overflow: hidden;
    width: 60%; height: 94%; border-radius: 30px 30px 0 0;
    background: #05060a;
    box-shadow: 0 50px 120px rgba(8, 20, 30, 0.22);
    will-change: width, height, border-radius;
    /* Flex column: text lives in a reserved region above the mockup, which is
       pinned to the bottom. Guarantees a gap so the two never collide. */
    display: flex; flex-direction: column; align-items: center;
  }

  /* Mock header: transparent bar, black text, a frosted pill per item.
     Sits in the stage (not the card) so it stays at the top; JS fades it. */
  .hero-header {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    width: 55%; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    will-change: opacity, transform, filter;
  }
  .hh-nav { display: flex; align-items: center; gap: 8px; }
  .hh-item {
    color: #07080d; font-size: 0.9rem; font-weight: 500;
    padding: 9px 15px; border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.55);
  }
  .hh-logo { font-weight: 800; letter-spacing: 0.02em; }
  .hh-cta { background: linear-gradient(110deg, #5FD6E8 0%, #2FA3B6 100%); color: #06181C; border-color: transparent; }

  .hero-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(65% 60% at 50% 65%, rgba(95,214,232,0.22), transparent 72%);
  }

  /* Headline block: takes the space above the mockup and centers its text in
     it. Padding (incl. bottom) keeps text off the card edges and the mockup. */
  .hero-content {
    position: relative; z-index: 3;
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    width: 100%; max-width: 760px;
    padding: clamp(3.5rem, 11vh, 7rem) clamp(20px, 5vw, 40px) clamp(1.75rem, 4vh, 3rem);
    text-align: center; will-change: transform, opacity, filter;
  }
  h1 { font-size: clamp(1.7rem, 5.4vw, 4rem); line-height: 1.06; letter-spacing: -0.035em; margin: 0 auto 1.1rem; color: #F6F7F9; }
  .lead { color: #B7B9C4; max-width: 46ch; margin: 0 auto 1.6rem; font-size: clamp(0.95rem, 1.4vw, 1.05rem); }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn { border: 0; border-radius: 11px; padding: 12px 22px; font-size: 0.95rem; cursor: pointer; }
  .btn--primary { background: linear-gradient(110deg, #5FD6E8 0%, #2FA3B6 100%); color: #06181C; }
  .btn--ghost { background: transparent; color: #F6F7F9; border: 0.5px solid #383848; }

  /* PLACEHOLDER — a "half rectangle" device hugging the bottom-center of the
     card. Static: it does NOT animate on scroll (the card expands around it).
     Bottom corners bleed past the card's bottom edge (clipped by overflow). */
  .hero-placeholder {
    flex: 0 0 auto; align-self: center;
    width: 58%; z-index: 2; line-height: 0;
  }
  .hero-placeholder img {
    display: block; width: 100%; height: auto;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -24px 90px rgba(0, 0, 0, 0.55);
  }

  .hero-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 32%; z-index: 4; pointer-events: none;
    background: linear-gradient(to top, rgba(5,6,10,0.96) 0%, rgba(5,6,10,0.50) 45%, transparent 100%);
  }

  .eyebrow {
    font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #8FD9E8; margin-bottom: 1rem; display: inline-block;
    background: rgba(111,201,216,0.20); border: 0.5px solid rgba(111,201,216,0.50);
    padding: 5px 12px; border-radius: 7px;
  }

  /* Short desktop/tablet heights (e.g. 1366×768 laptops): trim the big
     headline and shrink the mockup so they keep a comfortable gap. */
  @media (min-width: 641px) and (max-height: 860px) {
    .hero-content { padding-top: clamp(3rem, 8vh, 5.5rem); padding-bottom: 1.25rem; }
    h1 { font-size: clamp(1.9rem, 4.2vw, 3rem); }
    .hero-placeholder { width: 48%; }
  }

  /* Short viewports (landscape phones): tighten the headline and shrink the
     mockup so the text never grows down into it. */
  @media (max-height: 560px) {
    .hero-content { padding-top: clamp(1.75rem, 6vh, 3rem); padding-bottom: 0.6rem; }
    h1 { font-size: clamp(1.35rem, 3.6vw, 2rem); margin-bottom: 0.55rem; }
    .lead { font-size: 0.82rem; margin-bottom: 0.8rem; }
    .hero-placeholder { width: 32%; }
  }

  .after { min-height: 100vh; background: #f3f4f8; color: #2a2c3a; display: grid; place-items: center; }
  .after h2 { font-size: clamp(1.8rem, 4vw, 3rem); }
</style>
</head>
<body>
  <header class="hero-header">
    <span class="hh-item hh-logo">LIMITLESS</span>
    <nav class="hh-nav">
      <span class="hh-item">Features</span>
      <span class="hh-item">Solutions</span>
      <span class="hh-item">Pricing</span>
      <span class="hh-item hh-cta">Book a demo</span>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-stage">
      <div class="hero-card">
        <div class="hero-bg"></div>

        <div class="hero-content">
          <p class="eyebrow">Software company</p>
          <h1>One platform. Without limits.</h1>
          <p class="lead">Real-time financials, job costing, and project management — finally in one place.</p>
          <div class="actions">
            <button class="btn btn--primary">Explore Limitless</button>
            <button class="btn btn--ghost">Talk to us</button>
          </div>
        </div>

        <!-- Mockup image hugging the bottom (static). -->
        <div class="hero-placeholder" aria-hidden="true"><img src="https://spicolatechnologies.com/wp-content/uploads/2026/06/hero-mockup-scaled.png" alt=""></div>
      </div>
    </div>
  </section>

  <section class="after"><h2>Next section starts here</h2></section>

  <script>
    (function () {
      var hero = document.querySelector('.hero');
      var card = document.querySelector('.hero-card');
      var header = document.querySelector('.hero-header');
      var content = document.querySelector('.hero-content');
      var placeholder = document.querySelector('.hero-placeholder');

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
      // sub-progress 0->1 as p moves across [a, b]
      function range(p, a, b) { return clamp((p - a) / (b - a), 0, 1); }

      function readProgress() {
        var total = hero.offsetHeight - window.innerHeight;
        if (total <= 0) total = 1;
        return clamp(-hero.getBoundingClientRect().top / total, 0, 1);
      }

      function apply(p) {
        // Card finishes expanding at 78%, leaving a little scroll before header.
        var ce = easeInOut(clamp(p / 0.78, 0, 1));
        var vw = window.innerWidth;
        var startW = vw <= 640 ? 90 : vw <= 1024 ? 72 : 60;
        var startR = vw <= 640 ? 20 : vw <= 1024 ? 26 : 30;
        card.style.width = (startW + ce * (100 - startW)) + '%';  // 60%/72%/90% -> 100%
        var r = startR * (1 - ce);
        card.style.borderRadius = r + 'px ' + r + 'px 0 0';
        card.style.height = (94 + ce * 6) + '%';          // 94% -> 100%
        card.style.boxShadow = '0 50px 120px rgba(8,20,30,' + (0.22 * (1 - ce)) + ')';

        // Mockup grows from its resting size out toward the card edges as the
        // headline fades. Start mirrors the CSS tiers; end fills the card.
        var pvh = window.innerHeight;
        var startPh = pvh <= 560 ? 32 : (vw >= 641 && pvh <= 860) ? 48 : vw <= 640 ? 72 : 58;
        var endPh = vw <= 640 ? 82 : 64;
        placeholder.style.width = (startPh + ce * (endPh - startPh)) + '%';

        // Headline + buttons: the more you scroll, the more they blur + fade +
        // rise away (and reverse as you scroll back). Scrubbed across [0.02, 0.45].
        var co = range(p, 0.02, 0.45);
        content.style.opacity = String(1 - co);
        content.style.filter = 'blur(' + (co * 12) + 'px)';
        content.style.transform = 'translateY(' + (-co * 80) + 'px) scale(' + (1 - co * 0.03) + ')';

        // Header: visible at top, fades out fast [0, 0.15], returns at full-bleed [0.88, 1].
        var hv = clamp(1 - range(p, 0, 0.15) + range(p, 0.88, 1), 0, 1);
        header.style.opacity = String(hv);
        header.style.filter = 'blur(' + ((1 - hv) * 8) + 'px)';
        header.style.transform = 'translateX(-50%) translateY(' + (-(1 - hv) * 22) + 'px)';
        header.style.pointerEvents = hv < 0.5 ? 'none' : 'auto';
        // (Placeholder is intentionally static — no scroll animation.)
      }

      // Smoothing: lerp the applied progress toward the scroll target each
      // frame so the expansion glides instead of tracking the wheel 1:1.
      var target = readProgress(), current = target, rafId = null;
      function tick() {
        current += (target - current) * 0.12;
        if (Math.abs(target - current) < 0.0005) {
          current = target; apply(current); rafId = null; return;
        }
        apply(current);
        rafId = requestAnimationFrame(tick);
      }
      function onScroll() {
        target = readProgress();
        if (rafId === null) { rafId = requestAnimationFrame(tick); }
      }

      apply(current);
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
    })();
  </script>
</body>
</html>
